<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#000000"/>
  <g fill="#cc2020">
    <!-- Ornate flourish ring: 16 curling leaf motifs rotated around the centre -->
    <g id="wreath">
      <g transform="translate(256 256)">
        <g id="flourish">
          <!-- one leafy scroll unit near the top of the ring (r ~186) -->
          <path d="M-14,-192
                   c-10,-6 -22,-4 -28,6 c-6,10 -2,22 8,27 c-9,-2 -18,4 -20,13
                   c-2,10 5,19 15,20 c-7,3 -11,11 -8,19 c3,9 13,13 21,9
                   c-3,9 3,18 12,19 c6,1 12,-2 15,-7 c1,10 10,17 20,15
                   c-6,-7 -7,-17 -2,-25 c4,-7 3,-16 -3,-22 c8,3 17,-1 20,-9
                   c3,-8 -1,-17 -9,-20 c9,-1 15,-9 14,-18 c-1,-8 -8,-14 -16,-14
                   c6,-7 5,-18 -3,-24 c-7,-5 -16,-4 -22,2 c1,-4 1,-8 -1,-11 z" />
        </g>
        <use href="#flourish" transform="rotate(45)"/>
        <use href="#flourish" transform="rotate(90)"/>
        <use href="#flourish" transform="rotate(135)"/>
        <use href="#flourish" transform="rotate(180)"/>
        <use href="#flourish" transform="rotate(225)"/>
        <use href="#flourish" transform="rotate(270)"/>
        <use href="#flourish" transform="rotate(315)"/>
      </g>
    </g>
  </g>

  <!-- D20 (icosahedron) — line art, red -->
  <g fill="none" stroke="#cc2020" stroke-width="7" stroke-linejoin="round" stroke-linecap="round" transform="translate(256 256)">
    <!-- outer hexagon -->
    <polygon points="0,-96 83,-48 83,48 0,96 -83,48 -83,-48"/>
    <!-- top inner triangle face -->
    <polygon points="0,-96 48,-20 -48,-20"/>
    <!-- central inverted triangle -->
    <polygon points="-48,-20 48,-20 0,58"/>
    <!-- lower side faces -->
    <line x1="-48" y1="-20" x2="-83" y2="48"/>
    <line x1="48" y1="-20" x2="83" y2="48"/>
    <line x1="0" y1="58" x2="0" y2="96"/>
    <line x1="0" y1="58" x2="-83" y2="48"/>
    <line x1="0" y1="58" x2="83" y2="48"/>
    <!-- upper side edges to top vertex -->
    <line x1="-48" y1="-20" x2="-83" y2="-48"/>
    <line x1="48" y1="-20" x2="83" y2="-48"/>
  </g>
</svg>
