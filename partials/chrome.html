
<!-- Warning Banner -->
<div id="rollingBanner" class="rolling-banner" aria-live="polite">
  <span id="rollingBannerText" class="rolling-banner-text">This sheet autosaves character data to your browser. Use Export to back up your character.</span>
</div>

<!-- Admin Preview Banner -->
<div id="adminPreviewBanner" class="admin-preview-banner" style="display:none;" aria-live="polite">
  <div id="adminPreviewBannerText" class="admin-preview-banner-text">ADMIN PREVIEW</div>
  <button type="button" class="admin-preview-exit" onclick="exitAdminPreview()">Exit Preview</button>
</div>

<!-- Data Controls -->
<div class="header-bar">
  <!-- Home Button -->
  <button onclick="showHomePage()" class="accent-contrast-bg header-btn" title="Home">Home</button>
  <button onclick="openSettingsPage()" class="accent-contrast-bg header-btn" title="Settings">Settings</button>

</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" data-tab="page1" onclick="switchTab(this)">Stats</button>
  <button class="tab" data-tab="page2" onclick="switchTab(this)">Background</button>
  <button class="tab" data-tab="page3" onclick="switchTab(this)">Spells</button>
  <button class="tab" data-tab="page4" onclick="switchTab(this)">Inventory</button>
  <button class="tab" data-tab="page6" onclick="switchTab(this)">Notes</button>
</div>
