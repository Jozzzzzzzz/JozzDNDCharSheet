<!DOCTYPE html>
<html lang="en">
<head>

     use your exact artwork (iOS ignores SVG here). Falls back cleanly if absent. -->
<link rel="apple-touch-icon" href="assets/icon-192.png">

<script>
(function applySavedSettingsBeforePaint() {
  try {
    const stored = Number(localStorage.getItem('dndTextScalePercent') || '100');
    const percent = Number.isFinite(stored) ? Math.min(140, Math.max(85, Math.round(stored))) : 100;
    const scale = (percent / 100).toFixed(2);
    document.documentElement.style.setProperty('--text-scale', scale);
    document.documentElement.style.fontSize = `${(16 * percent / 100).toFixed(2)}px`;
  } catch (error) {
    document.documentElement.style.setProperty('--text-scale', '1');
  }
  try {
    const fontMap = {
      segoe:     "'Segoe UI', sans-serif",
      system:    "-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif",
      roboto:    "'Roboto', sans-serif",
      georgia:   "Georgia, 'Times New Roman', serif",
      garamond:  "Garamond, 'EB Garamond', 'Times New Roman', serif",
      verdana:   "Verdana, Geneva, sans-serif",
      tahoma:    "Tahoma, Geneva, sans-serif",
      trebuchet: "'Trebuchet MS', Helvetica, sans-serif",
      courier:   "'Courier New', Courier, monospace",
    };
    const saved = localStorage.getItem('dndFontFamily');
    if (saved && fontMap[saved]) {
      document.documentElement.style.setProperty('--font-family', fontMap[saved]);
    }
  } catch (e) {}
})();
</script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
<link rel="stylesheet" href="assets/styles.css">

<script>
(function lockHorizontalTouchPanning() {
  let startX = 0;
  let startY = 0;

  document.addEventListener('touchstart', function(event) {
    if (!event.touches || event.touches.length !== 1) return;
    startX = event.touches[0].clientX;
    startY = event.touches[0].clientY;
  }, { passive: true });

  // Prevent horizontal screen dragging while preserving normal vertical scrolling.
  document.addEventListener('touchmove', function(event) {
    if (!event.touches || event.touches.length !== 1) return;
    if (event.target && event.target.closest('input[type="range"], input[type="color"], select, button')) return;
    const dx = event.touches[0].clientX - startX;
    const dy = event.touches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) + 4 && event.cancelable) {
      event.preventDefault();
    }
  }, { passive: false });
})();

(function() {
  const savedAccentColor = localStorage.getItem('dndAccentColor');
  if (savedAccentColor) {
    document.documentElement.style.setProperty('--accent', savedAccentColor);
    const hex = savedAccentColor.replace('#', '');
    const r = parseInt(hex.substr(0, 2), 16);
    const g = parseInt(hex.substr(2, 2), 16);
    const b = parseInt(hex.substr(4, 2), 16);
    const mix = (v, t, a) => Math.round(v + (t - v) * a);
    const grey = 140;
    const borderColor = `rgba(${r}, ${g}, ${b}, 0.5)`;
    const softColor   = `rgba(${r}, ${g}, ${b}, 0.14)`;
    const mutedColor  = `rgba(${mix(r,grey,0.35)}, ${mix(g,grey,0.35)}, ${mix(b,grey,0.35)}, 0.55)`;
    const yiq = (r * 299 + g * 587 + b * 114) / 1000;
    const contrast = yiq >= 128 ? '#111111' : '#f0f0f0';
    const lighten = (value, amount) => Math.min(255, Math.round(value + (255 - value) * amount));
    const accentText = yiq < 120
      ? `rgb(${lighten(r, 0.65)}, ${lighten(g, 0.65)}, ${lighten(b, 0.65)})`
      : savedAccentColor;
    document.documentElement.style.setProperty('--accent-rgb', `${r}, ${g}, ${b}`);
    document.documentElement.style.setProperty('--accent-border', borderColor);
    document.documentElement.style.setProperty('--accent-soft', softColor);
    document.documentElement.style.setProperty('--accent-muted', mutedColor);
    document.documentElement.style.setProperty('--accent-contrast', contrast);
    document.documentElement.style.setProperty('--accent-text', accentText);
  }
  const savedBg = localStorage.getItem('dndBgImage');
  if (savedBg) {
    const s = document.createElement('style');
    s.id = 'bg-pseudo-style';
    s.textContent = `body::before { background-image: url('${savedBg}') !important; opacity: 1 !important; }`;
    document.head.appendChild(s);
    document.documentElement.classList.add('has-bg-image');
  }
})();
</script>
</head>
<body>
<div id="chrome-root"></div>
<div id="pages"></div>
<div id="popups-root"></div>
<div id="dm-chrome-root" style="display:none;"></div>
<div id="dm-pages-root" style="display:none;"></div>

<!-- Offline indicator: shown when the browser loses connectivity (sync paused). -->
<div id="offlineIndicator" class="offline-indicator" style="display:none;" role="status" aria-live="polite">
  <span class="offline-dot" aria-hidden="true"></span> Offline — changes saved locally, sync paused
</div>

<!-- Install app button: appears only when the browser offers PWA install. -->
<button id="installAppBtn" class="install-app-btn" style="display:none;" onclick="promptInstallApp()" title="Install this app">⤓ Install app</button>

<script>
async function loadText(path) {
  const res = await fetch(path, { cache: 'no-cache' });
  if (!res.ok) throw new Error(`Failed to load ${path}: ${res.status}`);
  return res.text();
}

function resolveRouteToPage() {
  const raw = (location.hash || '').replace('#', '').trim().toLowerCase();
  const map = {
    home: 'home',
    settings: 'settings',
    stats: 'page1',
    background: 'page2',
    spells: 'page3',
    inventory: 'page4',
    notes: 'page6',
    page1: 'page1',
    page2: 'page2',
    page3: 'page3',
    page4: 'page4',
    page6: 'page6'
  };
  return map[raw] || null;
}

function activateRoute() {
  const target = resolveRouteToPage();
  if (!target) return;

  if (target === 'home') {
    if (typeof window.showHomePage === 'function') {
      window.showHomePage();
    }
    return;
  }

  const tabBtn = document.querySelector(`.tab[data-tab="${target}"]`);
  if (tabBtn && typeof window.switchTab === 'function') {
    window.switchTab(tabBtn);
  }
}

(function installBootstrapStatHelpers() {
  const abilities = ['str', 'dex', 'con', 'int', 'wis', 'cha'];
  const skillAbilityMap = {
    acrobatics: 'dex',
    animal_handling: 'wis',
    arcana: 'int',
    athletics: 'str',
    deception: 'cha',
    history: 'int',
    insight: 'wis',
    intimidation: 'cha',
    investigation: 'int',
    medicine: 'wis',
    nature: 'int',
    perception: 'wis',
    performance: 'cha',
    persuasion: 'cha',
    religion: 'int',
    sleight_of_hand: 'dex',
    stealth: 'dex',
    survival: 'wis'
  };
  const skills = Object.keys(skillAbilityMap);

  function formatSignedNumber(value) {
    const n = parseInt(value, 10) || 0;
    return n >= 0 ? `+${n}` : `${n}`;
  }

  function parseSignedNumber(value) {
    if (value === null || value === undefined) return 0;
    return parseInt(String(value).trim().replace(/[^0-9+-]/g, ''), 10) || 0;
  }

  function sanitizeDigits(value, maxLength = null) {
    let cleaned = String(value || '').replace(/\D/g, '');
    if (maxLength) cleaned = cleaned.slice(0, maxLength);
    return cleaned;
  }

  function sanitizeSignedValue(value) {
    const trimmed = String(value || '').trim();
    if (!trimmed) return '+0';
    const sign = trimmed.startsWith('-') ? '-' : '+';
    const numeric = parseInt(trimmed.replace(/\D/g, ''), 10) || 0;
    return sign === '-' ? `-${numeric}` : `+${numeric}`;
  }

  function calculateSavingThrow(ability) {
    const saveInput = document.getElementById(`${ability}_save`);
    const profCheckbox = document.getElementById(`${ability}_save_prof`);
    const abilityBonus = document.getElementById(`${ability}_bonus`);
    const profBonus = document.getElementById('prof_bonus');
    if (!saveInput || !profCheckbox || !abilityBonus || !profBonus) return;
    const saveMod = parseSignedNumber(abilityBonus.value) + (profCheckbox.checked ? parseSignedNumber(profBonus.value) : 0);
    saveInput.value = formatSignedNumber(saveMod);
  }

  function calculateSkillBonus(skill) {
    const ability = skillAbilityMap[skill];
    const totalInput = document.getElementById(`bonus_${skill}`);
    const profCheckbox = document.getElementById(`prof_${skill}`);
    const adjInput = document.getElementById(`adj_${skill}`);
    const abilityBonus = ability ? document.getElementById(`${ability}_bonus`) : null;
    const profBonus = document.getElementById('prof_bonus');
    if (!totalInput || !profCheckbox || !abilityBonus || !profBonus) return;
    const total = parseSignedNumber(abilityBonus.value)
      + parseSignedNumber(adjInput ? adjInput.value : 0)
      + (profCheckbox.checked ? parseSignedNumber(profBonus.value) : 0);
    totalInput.value = formatSignedNumber(total);
  }

  function updateAllSkillBonuses() {
    skills.forEach(calculateSkillBonus);
  }

  Object.assign(window, {
    formatSignedNumber: window.formatSignedNumber || formatSignedNumber,
    parseSignedNumber: window.parseSignedNumber || parseSignedNumber,
    sanitizeDigits: window.sanitizeDigits || sanitizeDigits,
    sanitizeSignedValue: window.sanitizeSignedValue || sanitizeSignedValue,
    calculateAbilityBonus: window.calculateAbilityBonus || function(ability) {
      const scoreInput = document.getElementById(ability);
      const bonusInput = document.getElementById(`${ability}_bonus`);
      if (!scoreInput || !bonusInput) return;
      scoreInput.value = sanitizeDigits(scoreInput.value, 2);
      bonusInput.value = formatSignedNumber(Math.floor(((parseInt(scoreInput.value, 10) || 0) - 10) / 2));
      calculateSavingThrow(ability);
      updateAllSkillBonuses();
    },
    formatBonusInput: window.formatBonusInput || function(inputId) {
      if (!inputId) return;
      window.calculateAbilityBonus(inputId.replace('_bonus', ''));
    },
    formatSaveInput: window.formatSaveInput || function(inputId) {
      const input = document.getElementById(inputId);
      if (!input) return;
      input.value = sanitizeSignedValue(input.value).slice(0, 4);
    },
    calculateSavingThrow: window.calculateSavingThrow || calculateSavingThrow,
    calculateProficiencyBonus: window.calculateProficiencyBonus || function() {
      const level = parseInt(document.getElementById('char_level')?.value, 10) || 1;
      if (level >= 17) return '+6';
      if (level >= 13) return '+5';
      if (level >= 9) return '+4';
      if (level >= 5) return '+3';
      return '+2';
    },
    updateProficiencyBonus: window.updateProficiencyBonus || function() {
      const profBonusInput = document.getElementById('prof_bonus');
      if (profBonusInput) profBonusInput.value = window.calculateProficiencyBonus();
      abilities.forEach(calculateSavingThrow);
      updateAllSkillBonuses();
    },
    enforceAutoMathNumericInputs: window.enforceAutoMathNumericInputs || function() {},
    setupSkillCalculationFields: window.setupSkillCalculationFields || updateAllSkillBonuses,
    calculateSkillBonus: window.calculateSkillBonus || calculateSkillBonus,
    updateAllSkillBonuses: window.updateAllSkillBonuses || updateAllSkillBonuses
  });
})();

async function bootstrapModularApp() {
  const scriptVersion = '20260719a-v1.20';
  // Expose so modules can cache-bust their own data fetches (e.g. spells.json).
  window.__SCRIPT_VERSION__ = scriptVersion;
  const [chrome, home, settings, stats, background, spells, inventory, notes, popups,
         dmChrome, dmHome, dmLore, dmPlayers, dmSpells, dmMonsters, dmItems, dmEncounters, dmNpcs, dmLoot, dmNotes, dmSettings] = await Promise.all([
    loadText('partials/chrome.html'),
    loadText('pages/home.html'),
    loadText('pages/settings.html'),
    loadText('pages/stats.html'),
    loadText('pages/background.html'),
    loadText('pages/spells.html'),
    loadText('pages/inventory.html'),
    loadText('pages/notes.html'),
    loadText('partials/popups.html'),
    loadText('partials/dm-chrome.html'),
    loadText('pages/dm-home.html'),
    loadText('pages/dm-lore.html'),
    loadText('pages/dm-players.html'),
    loadText('pages/dm-spells.html'),
    loadText('pages/dm-monsters.html'),
    loadText('pages/dm-items.html'),
    loadText('pages/dm-encounters.html'),
    loadText('pages/dm-npcs.html'),
    loadText('pages/dm-loot.html'),
    loadText('pages/dm-notes.html'),
    loadText('pages/dm-settings.html')
  ]);

  document.getElementById('chrome-root').innerHTML = chrome;
  const pagesRoot = document.getElementById('pages');
  pagesRoot.innerHTML = [home, settings, stats, background, spells, inventory, notes].join('\n');
  document.getElementById('popups-root').innerHTML = popups;

  // DM portal roots (hidden until DM enters portal)
  document.getElementById('dm-chrome-root').innerHTML = dmChrome;
  document.getElementById('dm-pages-root').innerHTML = [dmHome, dmLore, dmPlayers, dmSpells, dmMonsters, dmItems, dmEncounters, dmNpcs, dmLoot, dmNotes, dmSettings].join('\n');

  const scriptOrder = [
    'assets/banner-messages.js',
    'assets/modules/stats.js',
    'assets/modules/cloud-skills.js',
    'assets/modules/core.js',
    'assets/modules/browser-engine.js',
    'assets/modules/layout.js',
    'assets/modules/characters.js',
    'assets/modules/health.js',
    'assets/modules/dice.js',
    'assets/modules/actions.js',
    'assets/modules/inventory.js',
    'assets/modules/spells.js',
    'assets/modules/admin.js',
    'assets/modules/loot.js',
    'assets/modules/dm.js',
    'assets/changelog.js',
    'assets/app.js'
  ];

  for (const src of scriptOrder) {
    await new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = `${src}?v=${scriptVersion}`;
      script.onload = resolve;
      script.onerror = reject;
      document.body.appendChild(script);
    });
  }

  if (typeof window.initializeApp === 'function') {
    window.initializeApp();
  }

  activateRoute();
  window.addEventListener('hashchange', activateRoute);

  // Register the cache-first service worker. The version query keeps the SW cache in
  // lockstep with scriptVersion — bumping the version publishes a fresh cache and the
  // old one is purged on activate, so users never get stale JS.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register(`sw.js?v=${scriptVersion}`).catch(err => {
        console.warn('Service worker registration failed (app still works online):', err);
      });
    });
  }

  initOfflineIndicator();
  initInstallPrompt();
}

// Offline indicator — reflects navigator.onLine, updated on the online/offline events.
function initOfflineIndicator() {
  const el = document.getElementById('offlineIndicator');
  if (!el) return;
  const update = () => { el.style.display = navigator.onLine ? 'none' : 'flex'; };
  window.addEventListener('online', update);
  window.addEventListener('offline', update);
  update();
}

// PWA install prompt — capture the browser's beforeinstallprompt so we can offer a
// themed "Install app" button instead of relying on the browser's own UI. The button
// hides once installed or dismissed.
let _deferredInstallPrompt = null;
function initInstallPrompt() {
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    _deferredInstallPrompt = e;
    const btn = document.getElementById('installAppBtn');
    if (btn) btn.style.display = 'inline-flex';
  });
  window.addEventListener('appinstalled', () => {
    _deferredInstallPrompt = null;
    const btn = document.getElementById('installAppBtn');
    if (btn) btn.style.display = 'none';
  });
}

async function promptInstallApp() {
  const btn = document.getElementById('installAppBtn');
  if (!_deferredInstallPrompt) { if (btn) btn.style.display = 'none'; return; }
  _deferredInstallPrompt.prompt();
  try { await _deferredInstallPrompt.userChoice; } catch (e) {}
  _deferredInstallPrompt = null;
  if (btn) btn.style.display = 'none';
}

bootstrapModularApp().catch(err => {
  console.error(err);
  const details = [
    String(err),
    err && err.stack ? err.stack : '',
    '',
    `calculateAbilityBonus: ${typeof window.calculateAbilityBonus}`,
    `formatBonusInput: ${typeof window.formatBonusInput}`,
    `core loaded: ${!!window.initializeApp}`
  ].join('\n');
  document.body.innerHTML = `<pre style="padding:16px;color:#fff;background:#111;white-space:pre-wrap;">Failed to bootstrap app:\n${details}</pre>`;
});
</script>
</body>
</html>
