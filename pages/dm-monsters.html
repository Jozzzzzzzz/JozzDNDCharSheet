<div class="dm-page" id="dm-monsters" style="display:none;">
  <div class="dm-page-header">
    <h2>Monsters</h2>
    <p class="dm-page-subtitle">SRD monster database via Open5e</p>
  </div>

  <div class="dm-card">
    <div class="dm-card-header">
      <h3>Browse Monsters</h3>
    </div>
    <div class="dm-search-bar">
      <input type="text" id="dmMonsterSearch" placeholder="Search monsters… (fuzzy — e.g. 'gobln', 'drgn')" autocomplete="off">
      <button class="dm-action-btn" onclick="dmLoadMonsters(true)" title="Re-download the latest from Open5e">Refresh</button>
    </div>
    <div class="lb-filter-group">
      <span class="lb-filter-group-label">Filter</span>
      <select id="dmMonsterCrFilter" title="Challenge rating">
        <option value="">All CRs</option>
        <option value="0">CR 0</option>
        <option value="0.125">CR 1/8</option>
        <option value="0.25">CR 1/4</option>
        <option value="0.5">CR 1/2</option>
        <option value="1">CR 1</option><option value="2">CR 2</option><option value="3">CR 3</option>
        <option value="4">CR 4</option><option value="5">CR 5</option><option value="6">CR 6</option>
        <option value="7">CR 7</option><option value="8">CR 8</option><option value="9">CR 9</option>
        <option value="10">CR 10</option><option value="11">CR 11</option><option value="12">CR 12</option>
        <option value="13">CR 13</option><option value="14">CR 14</option><option value="15">CR 15</option>
        <option value="16">CR 16</option><option value="17">CR 17</option><option value="18">CR 18</option>
        <option value="19">CR 19</option><option value="20">CR 20</option><option value="21">CR 21+</option>
      </select>
      <select id="dmMonsterTypeFilter" title="Creature type"><option value="">All types</option></select>
      <select id="dmMonsterSizeFilter" title="Size"><option value="">All sizes</option></select>
      <select id="dmMonsterAlignFilter" title="Alignment">
        <option value="">Any alignment</option>
        <option value="good">Good</option>
        <option value="evil">Evil</option>
        <option value="lawful">Lawful</option>
        <option value="chaotic">Chaotic</option>
        <option value="neutral">Neutral</option>
        <option value="unaligned">Unaligned</option>
      </select>
      <select id="dmMonsterMoveFilter" title="Movement">
        <option value="">Any movement</option>
        <option value="ground">Walks</option>
        <option value="fly">Flies</option>
        <option value="swim">Swims</option>
        <option value="burrow">Burrows</option>
        <option value="climb">Climbs</option>
      </select>
      <select id="dmMonsterLegendaryFilter" title="Legendary">
        <option value="">Any</option>
        <option value="yes">Legendary only</option>
        <option value="no">Non-legendary</option>
      </select>
      <select id="dmMonsterEnvFilter" title="Habitat / environment"><option value="">Any habitat</option></select>
    </div>
    <div class="lb-filter-group">
      <span class="lb-filter-group-label">Sort</span>
      <select id="dmMonsterSort">
        <option value="name">Name (A–Z)</option>
        <option value="crAsc">CR (low→high)</option>
        <option value="crDesc">CR (high→low)</option>
        <option value="hpAsc">HP (low→high)</option>
        <option value="hpDesc">HP (high→low)</option>
      </select>
      <span class="lb-count" id="dmMonsterCount"></span>
    </div>
    <p class="dm-note" id="dmMonstersNote">Loading monsters…</p>
    <div class="dm-load-progress" id="dmMonsterProgress" style="display:none;">
      <div class="dm-load-progress-bar" id="dmMonsterProgressBar"></div>
    </div>
    <div class="lb-viewport"><div id="dmMonstersList" class="dm-monsters-list lb-list"></div></div>
  </div>

  <!-- Monster detail panel -->
  <div id="dmMonsterDetail" class="dm-monster-detail" style="display:none;">
    <div class="dm-monster-detail-header">
      <h3 id="dmMonsterDetailName">Monster Name</h3>
      <button class="dm-close-detail-btn" onclick="document.getElementById('dmMonsterDetail').style.display='none'">✕ Close</button>
    </div>
    <div id="dmMonsterDetailBody" class="dm-monster-detail-body"></div>
  </div>
</div>
