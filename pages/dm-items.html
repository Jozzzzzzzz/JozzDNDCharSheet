<div class="dm-page" id="dm-items" style="display:none;">
  <div class="dm-page-header">
    <h2>Items</h2>
    <p class="dm-page-subtitle">The full equipment archive — magic items, weapons &amp; armor, via Open5e</p>
  </div>

  <div class="dm-card">
    <div class="dm-card-header">
      <h3>Item Archive</h3>
      <button class="dm-action-btn" onclick="dmLoadItems(true)" title="Reload from Open5e">Reload</button>
    </div>
    <div class="dm-search-bar">
      <input type="text" id="dmItemSearch" placeholder="Search items… (fuzzy — e.g. 'holy avngr', 'ring')" autocomplete="off">
    </div>
    <div class="lb-filter-group">
      <span class="lb-filter-group-label">Filter</span>
      <select id="dmItemTypeFilter" title="Category">
        <option value="">All categories</option>
        <option value="Magic Item">Magic Items</option>
        <option value="Weapon">Weapons</option>
        <option value="Armor">Armor</option>
      </select>
      <select id="dmItemRarityFilter" title="Rarity">
        <option value="">All rarities</option>
        <option value="common">Common</option>
        <option value="uncommon">Uncommon</option>
        <option value="rare">Rare</option>
        <option value="very rare">Very Rare</option>
        <option value="legendary">Legendary</option>
        <option value="artifact">Artifact</option>
        <option value="mundane">Mundane (weapons/armor)</option>
      </select>
      <select id="dmItemAttuneFilter" title="Attunement">
        <option value="">Any attunement</option>
        <option value="yes">Needs attunement</option>
        <option value="no">No attunement</option>
      </select>
    </div>
    <div class="lb-filter-group">
      <span class="lb-filter-group-label">Sort</span>
      <select id="dmItemSort">
        <option value="name">Name (A–Z)</option>
        <option value="rarity">Rarity (low→high)</option>
        <option value="rarityDesc">Rarity (high→low)</option>
      </select>
      <span class="lb-count" id="dmItemCount"></span>
    </div>
    <p class="dm-note" id="dmItemsNote">Loading the archive…</p>
    <div class="dm-load-progress" id="dmItemProgress" style="display:none;">
      <div class="dm-load-progress-bar" id="dmItemProgressBar"></div>
    </div>
    <div class="lb-viewport"><div id="dmItemsList" class="dm-monsters-list lb-list"></div></div>
  </div>

  <!-- Item detail panel -->
  <div id="dmItemDetail" class="dm-monster-detail" style="display:none;">
    <div class="dm-monster-detail-header">
      <h3 id="dmItemDetailName">Item Name</h3>
      <button class="dm-close-detail-btn" onclick="document.getElementById('dmItemDetail').style.display='none'">✕ Close</button>
    </div>
    <div id="dmItemDetailBody" class="dm-monster-detail-body"></div>
  </div>
</div>
