
  <div class="page" id="page4">
    <!-- Equipment Section -->
    <div class="section">
      <h2>Equipment (Part of Main Inventory)</h2>
      <div class="equipment-controls">
        <button onclick="showEquipmentForm()">+ Add Equipment</button>
      </div>
      <div class="equipment-list-container" id="equipment_list">
        <!-- Equipment will be populated here -->
      </div>
      <div class="weight-display" id="equipment_weight_total">Equipment Weight: 0 lbs / 0 kg</div>
    </div>
    
    <!-- Main Inventory Section -->
    <div class="section">
      <h2>Main Inventory</h2>
      <div class="inventory-controls">
        <div class="inventory-settings">
          <label>Max Weight Capacity:</label>
          <input type="number" id="max_weight_capacity" min="0" value="0" onchange="updateMaxWeightCapacity(); autosave()" placeholder="Enter max weight in lbs"/>
          <span>lbs</span>
        </div>
        <div class="currency-section">
          <div class="currency-header">
            <label>Currency</label>
            <div class="currency-tooltip">
              <button type="button" class="currency-help-btn" aria-label="Currency conversion reference">?</button>
              <div class="currency-tooltip-panel" role="tooltip">
                <strong>Rough NZD table estimate</strong>
                <span>1 CP ~= NZ$1</span>
                <span>1 SP ~= NZ$10</span>
                <span>1 EP ~= NZ$50</span>
                <span>1 GP ~= NZ$100</span>
                <span>1 PP ~= NZ$1,000</span>
                <small>For flavour only; D&D prices do not map cleanly to real economies.</small>
              </div>
            </div>
            <button type="button" class="currency-add-btn" onclick="addCustomCurrencyRow()">+</button>
          </div>
          <div class="currency-grid">
            <label for="currency_cp">CP</label>
            <input id="currency_cp" oninput="autosave()" type="number" min="0" value="0"/>
            <label for="currency_sp">SP</label>
            <input id="currency_sp" oninput="autosave()" type="number" min="0" value="0"/>
            <label for="currency_ep">EP</label>
            <input id="currency_ep" oninput="autosave()" type="number" min="0" value="0"/>
            <label for="gold_field">GP</label>
            <input id="gold_field" oninput="autosave()" type="number" min="0" value="0"/>
          </div>
          <div id="custom_currency_rows" class="custom-currency-rows"></div>
        </div>
      </div>
      
      <div class="inventory-controls">
        <button onclick="showItemForm('main')">+ Add Item</button>
      </div>
      
      <div class="inventory-list-container" id="main_inventory_list">
        <!-- Main inventory items will be populated here -->
      </div>
      <div class="weight-display" id="main_inventory_weight_total">Total: 0 lbs / 0 kg</div>
    </div>

    
    <!-- Extra containers last -->
    <div id="extra_containers">
      <!-- Additional containers will be added here -->
    </div>
    
    <div class="section additional-storage-section">
      <h2>Additional Storage</h2>
      <div class="inventory-controls">
        <button onclick="showAddStoragePopup()">+ Add Additional Storage</button>
      </div>
    </div>
  </div>
