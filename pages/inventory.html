<div class="page" id="page4">
  <!-- Equipment Section -->
  <div class="section">
    <h2>Equipment (Part of Main Inventory)</h2>
    <div class="equipment-controls">
      <button onclick="showEquipmentForm()">+ Add Equipment</button>
    </div>
    <div class="equipment-list-container" id="equipment_list">
      <!-- Equipment will be populated here -->
    </div>
    <div class="weight-display" id="equipment_weight_total">
      Equipment Weight: 0 lbs / 0 kg
    </div>
  </div>

  <!-- Main Inventory Section -->
  <div class="section">
    <h2>Main Inventory</h2>

    <div class="inventory-controls">
      <div class="inventory-settings">
        <label>Max Weight Capacity:</label>
        <input
          type="number"
          id="max_weight_capacity"
          min="0"
          value="0"
          onchange="updateMaxWeightCapacity(); autosave()"
          placeholder="Enter max weight in lbs"
        />
        <span>lbs</span>
      </div>

      <div class="inventory-settings" style="margin-top: 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
        <input type="checkbox" id="encumbrance_toggle" onchange="toggleEncumbrance()" style="width: auto; margin: 0;"/>
        <label for="encumbrance_toggle" style="margin: 0; cursor: pointer;">Use D&amp;D 5e Encumbrance Rules</label>
        <span id="encumbrance_status" style="font-size: 0.85em; opacity: 0.8;"></span>
      </div>

      <div class="currency-section">
        <div class="currency-header">
          <label>Currency</label>
        </div>

        <!-- CHANGED TO ROW LAYOUT -->
        <div
          id="currency_row"
          style="
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
          "
        >
          <label for="currency_cp">Copper</label>
          <input
            id="currency_cp"
            oninput="autosave()"
            type="number"
            min="0"
            value="0"
            style="width: 70px;"
          />

          <label for="currency_sp">Silver</label>
          <input
            id="currency_sp"
            oninput="autosave()"
            type="number"
            min="0"
            value="0"
            style="width: 70px;"
          />

          <label for="gold_field">Gold</label>
          <input
            id="gold_field"
            oninput="autosave()"
            type="number"
            min="0"
            value="0"
            style="width: 70px;"
          />
        </div>

        <div id="custom_currency_rows" class="custom-currency-rows"></div>
      </div>
    </div>

    <div class="inventory-controls" style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
      <button onclick="showItemForm('main')">+ Add Item</button>
      <input type="search" id="main_inventory_search" placeholder="Filter items..." oninput="filterInventory('main')" style="flex: 1; min-width: 120px;"/>
    </div>

    <div class="inventory-list-container" id="main_inventory_list">
      <!-- Main inventory items will be populated here -->
    </div>

    <div class="weight-display" id="main_inventory_weight_total">
      Total: 0 lbs / 0 kg
    </div>
  </div>

  <!-- Extra containers last -->
  <div id="extra_containers">
    <!-- Additional containers will be added here -->
  </div>

  <div class="section additional-storage-section">
    <h2>Additional Storage</h2>
    <div class="inventory-controls">
      <button onclick="showAddStoragePopup()">
        + Add Additional Storage
      </button>
    </div>
  </div>

  <!-- Purchase History Section -->
  <div class="section" id="purchase_history_section">
    <h2>Purchase History</h2>
    <div id="purchase_history_list">
      <p style="text-align: center; color: var(--text); opacity: 0.7;">No purchases recorded yet. Use the + button on a stackable item to record a purchase.</p>
    </div>
    <div style="margin-top: 10px; text-align: right;">
      <button onclick="clearPurchaseHistory()" style="font-size: 0.8em; opacity: 0.7;">Clear History</button>
    </div>
  </div>
</div>
```
