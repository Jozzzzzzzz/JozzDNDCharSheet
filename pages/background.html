
  <div class="page" id="page2">

    <!-- Portrait + Backstory row -->
    <div class="background-grid">
      <div class="section resizable">
        <h2>Portrait</h2>
        <div class="portrait-container" id="portraitPreview">
          <span style="color: #666;">No image</span>
        </div>
        <input type="file" id="portraitUpload" accept="image/*" style="width: 100%; margin-bottom: 10px;"/>
        <button onclick="removePortrait()" style="width: 100%;">Remove Portrait</button>
      </div>

      <div class="section">
        <h2>Backstory</h2>
        <textarea id="char_backstory" class="basic-textarea"
                  oninput="autosave()" placeholder="Enter your character's backstory here..."></textarea>
      </div>
    </div>

    <!-- Custom fields toolbar -->
    <div class="bg-fields-toolbar">
      <button class="bg-reorder-toggle" id="bgReorderToggle" onclick="toggleBgReorderMode()">Reorder Mode</button>
      <button class="bg-add-field-btn" onclick="showAddBgFieldPopup()">+ Add Box</button>
    </div>

    <!-- Custom fields grid -->
    <div class="background-textareas" id="bgCustomFieldsGrid">
      <!-- Default fields rendered by JS on load -->
    </div>

    <!-- Add field popup -->
    <div id="addBgFieldPopup" class="popup-overlay" style="display:none;" onclick="if(event.target===this)closeBgFieldPopup()">
      <div class="popup-content" style="max-width:400px;">
        <h3>Add New Box</h3>
        <label>Title</label>
        <input type="text" id="bgFieldTitleInput" placeholder="e.g. Motivations" style="width:100%;margin-bottom:12px;"/>
        <label>Placeholder text (optional)</label>
        <input type="text" id="bgFieldPlaceholderInput" placeholder="e.g. What drives your character?" style="width:100%;margin-bottom:16px;"/>
        <div style="display:flex;gap:8px;">
          <button onclick="confirmAddBgField()" style="flex:1;">Add</button>
          <button onclick="closeBgFieldPopup()" style="flex:1;">Cancel</button>
        </div>
      </div>
    </div>

  </div>
