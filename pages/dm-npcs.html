<div class="dm-page" id="dm-npcs" style="display:none;">
  <div class="dm-page-header">
    <h2>NPC Builder</h2>
    <p class="dm-page-subtitle">Generate and save NPCs for your campaign</p>
  </div>

  <div class="dm-npc-layout">

    <!-- Generator -->
    <div class="dm-card dm-npc-generator">
      <div class="dm-card-header">
        <h3>Quick Generate</h3>
        <button class="dm-action-btn" onclick="dmGenerateNpc()">Generate NPC</button>
      </div>

      <div class="dm-npc-form">
        <div class="dm-field-row">
          <label>Name</label>
          <div class="dm-name-row">
            <input type="text" id="dmNpcName" placeholder="NPC name" maxlength="60">
            <button class="dm-icon-btn" onclick="dmRollNpcName()" title="Random name">🎲</button>
          </div>
        </div>
        <div class="dm-field-row">
          <label>Race</label>
          <select id="dmNpcRace">
            <option value="">Any</option>
            <option value="Human">Human</option>
            <option value="Elf">Elf</option>
            <option value="Dwarf">Dwarf</option>
            <option value="Halfling">Halfling</option>
            <option value="Gnome">Gnome</option>
            <option value="Half-Elf">Half-Elf</option>
            <option value="Half-Orc">Half-Orc</option>
            <option value="Tiefling">Tiefling</option>
            <option value="Dragonborn">Dragonborn</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="dm-field-row">
          <label>Role / Class</label>
          <select id="dmNpcRole">
            <option value="">Any</option>
            <option value="Commoner">Commoner</option>
            <option value="Guard">Guard</option>
            <option value="Merchant">Merchant</option>
            <option value="Innkeeper">Innkeeper</option>
            <option value="Bandit">Bandit</option>
            <option value="Cultist">Cultist</option>
            <option value="Noble">Noble</option>
            <option value="Mage">Mage</option>
            <option value="Priest">Priest</option>
            <option value="Spy">Spy</option>
            <option value="Assassin">Assassin</option>
            <option value="Gladiator">Gladiator</option>
          </select>
        </div>
        <div class="dm-field-row">
          <label>Alignment</label>
          <select id="dmNpcAlignment">
            <option value="">Any</option>
            <option value="Lawful Good">Lawful Good</option>
            <option value="Neutral Good">Neutral Good</option>
            <option value="Chaotic Good">Chaotic Good</option>
            <option value="Lawful Neutral">Lawful Neutral</option>
            <option value="True Neutral">True Neutral</option>
            <option value="Chaotic Neutral">Chaotic Neutral</option>
            <option value="Lawful Evil">Lawful Evil</option>
            <option value="Neutral Evil">Neutral Evil</option>
            <option value="Chaotic Evil">Chaotic Evil</option>
          </select>
        </div>
        <div class="dm-field-row">
          <label>Notes</label>
          <textarea id="dmNpcNotes" placeholder="Personality, appearance, secrets..." rows="3" maxlength="500"></textarea>
        </div>

        <div class="dm-npc-loot">
          <div class="dm-card-header" style="padding:0 0 8px 0; border:none;">
            <h4>Loot</h4>
            <button class="dm-icon-btn" onclick="dmRollLoot()" title="Roll loot">🎲 Roll Loot</button>
          </div>
          <div id="dmNpcLootResult" class="dm-loot-result dm-empty-state">Hit "Roll Loot" to generate a loot drop.</div>
        </div>

        <button class="dm-action-btn dm-save-btn" style="margin-top:12px;" onclick="dmSaveNpc()">Save NPC</button>
      </div>
    </div>

    <!-- Saved NPCs -->
    <div class="dm-card dm-saved-npcs">
      <div class="dm-card-header">
        <h3>Saved NPCs</h3>
        <button class="dm-action-btn" onclick="dmClearAllNpcs()">Clear All</button>
      </div>
      <div id="dmNpcList" class="dm-npc-list">
        <p class="dm-empty-state">No saved NPCs yet.</p>
      </div>
    </div>

  </div>
</div>
