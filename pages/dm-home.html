<div class="dm-page" id="dm-home" style="display:none;">
  <div class="dm-page-header">
    <h2>DM Dashboard</h2>
    <p class="dm-page-subtitle" id="dmHomeGreeting">Welcome back.</p>
  </div>

  <div class="dm-home-grid">

    <div class="dm-card dm-campaign-card">
      <div class="dm-card-header">
        <h3>Active Campaign</h3>
      </div>
      <div class="dm-campaign-summary">
        <div class="dm-stat-row">
          <span class="dm-stat-label">Campaign</span>
          <span class="dm-stat-value" id="dmHomeCampaignName">—</span>
        </div>
        <div class="dm-stat-row">
          <span class="dm-stat-label">Setting</span>
          <span class="dm-stat-value" id="dmHomeCampaignSetting">—</span>
        </div>
        <div class="dm-stat-row">
          <span class="dm-stat-label">Players</span>
          <span class="dm-stat-value" id="dmHomeCampaignPlayers">—</span>
        </div>
      </div>
    </div>

    <div class="dm-card dm-quicknav-card">
      <div class="dm-card-header">
        <h3>Quick Access</h3>
      </div>
      <div class="dm-quicknav-grid">
        <button class="dm-quicknav-btn" onclick="switchDmTabById('dm-players')">
          <span class="dm-qn-icon">👥</span>
          <span>Players</span>
        </button>
        <button class="dm-quicknav-btn" onclick="switchDmTabById('dm-monsters')">
          <span class="dm-qn-icon">🐉</span>
          <span>Monsters</span>
        </button>
        <button class="dm-quicknav-btn" onclick="switchDmTabById('dm-encounters')">
          <span class="dm-qn-icon">⚔️</span>
          <span>Encounters</span>
        </button>
        <button class="dm-quicknav-btn" onclick="switchDmTabById('dm-npcs')">
          <span class="dm-qn-icon">🧙</span>
          <span>NPCs</span>
        </button>
      </div>
    </div>

  </div>
</div>
